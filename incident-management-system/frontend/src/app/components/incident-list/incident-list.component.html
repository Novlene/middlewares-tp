<div class="container">
  <div class="header">
    <h1>Incident Management System</h1>
    <button class="btn btn-primary" routerLink="/add">
      + Add New Incident
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading">
    <p>Loading incidents...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="errorMessage" class="error">
    <p>{{ errorMessage }}</p>
    <button class="btn btn-secondary" (click)="loadIncidents()">Retry</button>
  </div>

  <!-- Incidents List -->
  <div *ngIf="!isLoading && !errorMessage">
    <p class="total-count">Total Incidents: {{ incidents.length }}</p>

    <div *ngIf="incidents.length === 0" class="no-incidents">
      <p>No incidents found. Create your first incident!</p>
    </div>

    <div class="incidents-grid">
      <div
        *ngFor="let incident of incidents"
        class="incident-card"
      >
        <div class="incident-header">
          <h3>{{ incident.title }}</h3>
          <span [class]="getStatusClass(incident.status)" class="status-badge">
            {{ incident.status }}
          </span>
        </div>

        <p class="incident-description">{{ incident.description }}</p>

        <div class="incident-footer">
          <div class="status-selector">
            <label>Update Status:</label>
            <select
              [value]="incident.status"
              (change)="updateStatus(incident, $any($event.target).value)"
              class="status-select"
            >
              <option value="OPEN">OPEN</option>
              <option value="IN_PROGRESS">IN PROGRESS</option>
              <option value="RESOLVED">RESOLVED</option>
              <option value="CLOSED">CLOSED</option>
            </select>
          </div>

          <button
            class="btn btn-danger"
            (click)="deleteIncident(incident.id)"
          >
            Delete
          </button>
        </div>

        <p class="incident-id">ID: {{ incident.id }}</p>
      </div>
    </div>
  </div>
</div>
